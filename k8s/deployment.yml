apiVersion: apps/v1
kind: Deployment
metadata:
  name: spark-job-service
  namespace: ksoot
  labels:
    name: spark-job-service
spec:
  replicas: 1
  progressDeadlineSeconds: 1200
  revisionHistoryLimit: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 50%
      maxUnavailable: 50%
  selector:
    matchLabels:
      name: spark-job-service
  template:
    metadata:
      labels:
        name: spark-job-service
    spec:
      serviceAccountName: spark
      containers:
      - name: spark-job-service
        image: spark-job-service:0.0.1
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8090
          #              The configs not defined as in application.yml can be passed in args as follows
        args:
        - "--spark.executor.instances=2"
        - "--spark.default.parallelism=16"
        - "--spark-launcher.env.POSTGRES_URL=jdbc:postgresql://postgres:5432/spark_jobs_db"
        - "--spark-launcher.env.POSTGRES_USER=${POSTGRES_USERNAME}"
        - "--spark-launcher.env.POSTGRES_PASSWORD=${POSTGRES_PASSWORD}"
        - "--spark-launcher.env.KAFKA_BOOTSTRAP_SERVERS=kafka:9092"
        - "--spark-launcher.jobs.sales-report-job.env.MONGODB_URL=mongodb://mongo:27017"
        - "--spark-launcher.jobs.sales-report-job.env.ARANGODB_URL=arango:8529"
        - "--spark-launcher.jobs.sales-report-job.spark-config.spark.driver.userClassPathFirst=true"
        - "--spark-launcher.jobs.sales-report-job.spark-config.spark.executor.userClassPathFirst=true"
        - "--spark-launcher.jobs.logs-analysis-job.env.JDBC_URL=jdbc:postgresql://postgres:5432"
        - "--spark-launcher.env.JDBC_USER=${POSTGRES_USERNAME}"
        - "--spark-launcher.env.JDBC_PASSWORD=${POSTGRES_PASSWORD}"
        env:
        #            - name: SPRING_PROFILES_ACTIVE
        #              value: minikube
        #            Job Properties
        #            - name: SPARK_OUTPUT_PATH
        #              value: gs://fetch-bucket/spark-output
        #              Spark properties
        - name: SPARK_MASTER
          value: k8s://https://kubernetes.default.svc
        - name: SPARK_KUBERNETES_NAMESPACE
          value: ksoot
        - name: SPARK_KUBERNETES_AUTHENTICATE_DRIVER_SERVICE_ACCOUNT_NAME
          value: spark
        - name: SPARK_KUBERNETES_DRIVER_ENV_SPARK_USER
          value: spark
        - name: SPARK_SUBMIT_DEPLOY_MODE
          value: cluster
        - name: KAFKA_BOOTSTRAP_SERVERS
          value: kafka:9092
        - name: POSTGRES_URL
          value: jdbc:postgresql://postgres:5432/spark_jobs_db
        - name: POSTGRES_USERNAME
          value: postgres
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: platform-secrets
              key: postgres-password
        - name: SPARK_LAUNCHER_ENV_POSTGRES_USER
          value: postgres
        - name: SPARK_LAUNCHER_ENV_POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: platform-secrets
              key: postgres-password
        - name: SPARK_LAUNCHER_ENV_JDBC_USER
          value: postgres
        - name: SPARK_LAUNCHER_ENV_JDBC_PASSWORD
          valueFrom:
            secretKeyRef:
              name: platform-secrets
              key: postgres-password
        - name: JDBC_URL
          value: jdbc:postgresql://postgres:5432
        - name: PERSIST_JOBS
          value: "true"
        - name: CAPTURE_JOBS_LOGS
          value: "true"
---
apiVersion: v1
kind: Service
metadata:
  name: spark-job-service
  namespace: ksoot
spec:
  type: ClusterIP
  selector:
    name: spark-job-service
  ports:
  - name: http
    port: 8090