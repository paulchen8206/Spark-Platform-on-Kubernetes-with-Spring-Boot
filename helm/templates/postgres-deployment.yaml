{{- $platformSecretName := default "platform-secrets" .Values.platformSecrets.existingSecret }}
# ─── PostgreSQL for Conduktor backend ───────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: postgres-conduktor
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.postgresql.conduktor.service.port }}
      targetPort: 5432
  selector:
    app: postgres-conduktor
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-conduktor
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres-conduktor
  template:
    metadata:
      labels:
        app: postgres-conduktor
    spec:
      containers:
        - name: postgres-conduktor
          image: {{ .Values.postgresql.image.repository }}:{{ .Values.postgresql.image.tag }}
          env:
            - name: POSTGRES_DB
              value: {{ .Values.postgresql.conduktor.database | quote }}
            - name: POSTGRES_USER
              value: {{ .Values.postgresql.auth.username | quote }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ $platformSecretName }}
                  key: postgres-password
          ports:
            - containerPort: 5432
---
# ─── PostgreSQL for Spark job sink databases ────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-spark-init
data:
  init-spark-postgres.sh: |
    #!/bin/bash
    set -e
    echo "Creating extra Spark database: $POSTGRES_EXTRA_DB"
    psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" \
      -c "CREATE DATABASE $POSTGRES_EXTRA_DB;" \
      -c "GRANT ALL PRIVILEGES ON DATABASE $POSTGRES_EXTRA_DB TO $POSTGRES_USER;"
    echo "Done."
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-spark
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.postgresql.spark.service.port }}
      targetPort: 5432
  selector:
    app: postgres-spark
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-spark
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres-spark
  template:
    metadata:
      labels:
        app: postgres-spark
    spec:
      containers:
        - name: postgres-spark
          image: {{ .Values.postgresql.image.repository }}:{{ .Values.postgresql.image.tag }}
          env:
            - name: POSTGRES_DB
              value: {{ .Values.postgresql.spark.database | quote }}
            - name: POSTGRES_USER
              value: {{ .Values.postgresql.auth.username | quote }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ $platformSecretName }}
                  key: postgres-password
            - name: POSTGRES_EXTRA_DB
              value: {{ .Values.postgresql.spark.extraDatabase | quote }}
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: init-script
              mountPath: /docker-entrypoint-initdb.d/init-spark-postgres.sh
              subPath: init-spark-postgres.sh
      volumes:
        - name: init-script
          configMap:
            name: postgres-spark-init
            defaultMode: 0755
