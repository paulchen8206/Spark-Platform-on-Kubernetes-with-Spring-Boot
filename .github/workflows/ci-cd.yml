name: Multi-Environment CI/CD Pipeline
on:
  push:
    branches:
    - dev
    - testing
    - stg
  pull_request:
    branches:
    - prd
jobs:
  ci-dev:
    if: github.ref == 'refs/heads/dev'
    runs-on: ubuntu-latest
    environment: dev
    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
    - name: Build with Maven
      run: mvn clean install --batch-mode
    - name: Run tests
      run: mvn test
  ci-qa:
    if: github.ref == 'refs/heads/testing'
    runs-on: ubuntu-latest
    environment: qa
    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
    - name: Build with Maven
      run: mvn clean install --batch-mode
    - name: Run tests
      run: mvn test
    - name: Build Docker images
      run: |
        docker build -t ${{ secrets.DOCKER_REPO }}/spark-job-service:qa ./spark-job-service
        # Repeat for other modules
    - name: Push to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
    - name: Push images
      run: |
        docker push ${{ secrets.DOCKER_REPO }}/spark-job-service:qa
        # Repeat for other modules
    - name: Deploy to QA Kubernetes
      uses: azure/setup-kubectl@v3
    - name: Deploy
      run: |
        kubectl apply -f infra-k8s-deployment.yml
        # Or use Helm:
        # helm upgrade --install qa-release ./helm -f helm/values-qa.yaml
  ci-stg:
    if: github.ref == 'refs/heads/stg'
    runs-on: ubuntu-latest
    environment: stg
    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
    - name: Build with Maven
      run: mvn clean install --batch-mode
    - name: Run tests
      run: mvn test
    - name: Build Docker images
      run: |
        docker build -t ${{ secrets.DOCKER_REPO }}/spark-job-service:stg ./spark-job-service
        # Repeat for other modules
    - name: Push to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
    - name: Push images
      run: |
        docker push ${{ secrets.DOCKER_REPO }}/spark-job-service:stg
        # Repeat for other modules
    - name: Deploy to Staging Kubernetes
      uses: azure/setup-kubectl@v3
    - name: Deploy
      run: |
        kubectl apply -f infra-k8s-deployment.yml
        # Or use Helm:
        # helm upgrade --install stg-release ./helm -f helm/values-stg.yaml
  ci-prd:
    if: github.event_name == 'pull_request' && github.base_ref == 'prd'
    runs-on: ubuntu-latest
    environment: prd
    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
    - name: Build with Maven
      run: mvn clean install --batch-mode
    - name: Run tests
      run: mvn test
    - name: Build Docker images
      run: |
        docker build -t ${{ secrets.DOCKER_REPO }}/spark-job-service:prd ./spark-job-service
        # Repeat for other modules
    - name: Push to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
    - name: Push images
      run: |
        docker push ${{ secrets.DOCKER_REPO }}/spark-job-service:prd
        # Repeat for other modules
    - name: Deploy to Production Kubernetes
      uses: azure/setup-kubectl@v3
    - name: Deploy
      run: |-
        kubectl apply -f infra-k8s-deployment.yml
        # Or use Helm:
        # helm upgrade --install prd-release ./helm -f helm/values-prd.yaml